comfyui:
  host: 127.0.0.1
  port: 8002
  comfyui_path: C:/ComfyUI
  timeout: 1200

models:
  dir: C:/Users/barna/Documents/ComfyUI/models
  checkpoint: Juggernaut-XL_v9_RunDiffusionPhoto_v2.safetensors
  checkpoint_juggernaut: Juggernaut-XL_v9_RunDiffusionPhoto_v2.safetensors
  ipadapter: ip-adapter-plus-face_sdxl_vit-h.safetensors
  flux_gguf_q4: flux1-schnell-Q4_K_S.gguf
  flux_gguf_q3: flux1-schnell-Q3_K_S.gguf
  flux_vae: ae.safetensors
  clip_l: clip_l.safetensors
  t5xxl: t5xxl_fp8_e4m3fn.safetensors
  upscaler: 4x-UltraSharp.pth
  controlnet_openpose: control-lora-openposeXL2-rank256.safetensors

characters:
  ananya:
    trigger_word: AnanyaAI
    lora: AnanyaAI_v1_Prod.safetensors
    lora_strength: 0.9
    flux_lora: AnanyaAI_FLUX_v1.safetensors
    flux_lora_strength: 0.85
    ipadapter_strength: 0.55
    base_prompt_file: character/ananya/base_prompt.txt
    output_subdir: ananya
    seeds_dir: character/ananya/seeds
    training_data_dir: character/ananya/training_data
  kavib:
    trigger_word: KaviB
    lora: KaviB_v1_Prod.safetensors
    lora_strength: 0.85
    flux_lora: KaviB_FLUX_v1.safetensors
    flux_lora_strength: 0.85
    ipadapter_strength: 0.6
    base_prompt_file: character/kavib/base_prompt.txt
    output_subdir: kavib
    seeds_dir: character/kavib/seeds
    training_data_dir: character/kavib/training_data

generation:
  workflow: t2i_sdxl_lora
  steps: 30
  cfg: 8.0
  width: 896
  height: 1152
  sampler: dpmpp_2m
  scheduler: karras
  negative_prompt: "(studio photography, plain background, solid color background, seamless paper, blank background, isolated subject, simple background:1.4), cgi, 3d, render, cartoon, illustration, drawing, painting, bad proportions, bad quality, low quality, deformed, ugly, extra limbs, bad anatomy, watermark, text, signature, bindi, tikka, maang tikka, jhumka, chandbaali, heavy necklace, traditional jewelry, dupatta, kurta, anarkali, salwar, heavily embroidered, bridal, deformed hands, extra fingers, bad hands, malformed hands, mutated hands, missing fingers, fused fingers, too many fingers, poorly drawn hands, mangled hands, floating hands, disembodied hands, hands near face, hand on chin, fingers touching face, bad lips, deformed mouth, crooked teeth, asymmetrical eyes, uneven eyes, cross-eyed, lazy eye, wall-eyed, different sized eyes, strabismus, dusky skin, dark skin, tan skin, olive complexion, brown skin, tanned, dark complexion, dark tone, unpainted nails, chipped nails, no makeup, shiny jewelry, reflective jewelry, oversized jewelry, chunky jewelry, statement jewelry, spaghetti straps, thin straps, bra top, bandeau top, tube top, strapless top, off-shoulder, off shoulder, bardot neckline, one-shoulder, turtleneck, halter neck, midriff cutout, cutout dress, cutout detail, cut-out dress, side cutout, stomach cutout, skinny body, thin body, slender body, underweight, petite frame, narrow hips, flat stomach, visible ribs, bony arms, thigh gap"

reels:
  anchor_width: 768
  anchor_height: 1360
  anchor_subdir: reels/anchors

gpu:
  use_lowvram: true
  tile_vae: true
  vram_limit_gb: 6

rescue_mode:
  width: 768
  height: 1024
  steps: 26
  workflow: t2i_sdxl_lora

carousel:
  default_slide_count: 3
  body_tokens: "realistic size M Indian woman, medium curvy build, fuller hips and thighs, natural waist, soft stomach, fuller bust, realistic proportions"
  img2img_denoise: 0.62
  img2img_denoise_by_role:
    medium: 0.70
    close: 0.65
    hands: 0.82
  controlnet_strength: 0.5
  controlnet_strength_by_role:
    wide: 0.75
    medium: 0.75
    close: 0.60
  low_bokeh_negative: "bokeh, blurry background, depth of field blur, lens blur, out of focus background, shallow depth of field, soft background, background blur"
  sharp_background_positive: "sharp background, environmental detail, realistic depth, f/8 aperture, deep focus, no lens blur, street photography"

paths:
  output_dir: output
  log_dir: logs
  workflows_dir: workflows
  reels_dir: reels
