comfyui:
  host: 127.0.0.1
  port: 8002
  comfyui_path: C:/ComfyUI
  timeout: 300

models:
  dir: C:/Users/barna/Documents/ComfyUI/models
  checkpoint: Juggernaut-XL_v9_RunDiffusionPhoto_v2.safetensors
  ipadapter: ip-adapter-plus-face_sdxl_vit-h.safetensors
  flux_gguf_q4: flux1-schnell-Q4_K_S.gguf
  flux_gguf_q3: flux1-schnell-Q3_K_S.gguf
  flux_vae: ae.safetensors
  clip_l: clip_l.safetensors
  t5xxl: t5xxl_fp8_e4m3fn.safetensors

characters:
  ananya:
    trigger_word: AnanyaAI
    lora: AnanyaAI_v1_Prod.safetensors
    lora_strength: 0.70
    ipadapter_strength: 0.6
    base_prompt_file: character/ananya/base_prompt.txt
    output_subdir: ananya
    seeds_dir: character/ananya/seeds
  kavib:
    trigger_word: KaviB
    lora: KaviB_v1_Prod.safetensors
    lora_strength: 0.85
    ipadapter_strength: 0.6
    base_prompt_file: character/kavib/base_prompt.txt
    output_subdir: kavib
    seeds_dir: character/kavib/seeds

generation:
  workflow: t2i_sdxl_lora
  steps: 30
  cfg: 8.0
  width: 896
  height: 1152
  sampler: dpmpp_2m
  scheduler: karras
  negative_prompt: "worst quality, low quality, deformed, ugly, extra limbs, bad anatomy, watermark, text, signature, bindi, tikka, maang tikka, jhumka, chandbaali, heavy necklace, traditional jewelry, dupatta, kurta, anarkali, salwar, heavily embroidered, bridal, deformed hands, extra fingers, bad hands, malformed hands, mutated hands, missing fingers, fused fingers, too many fingers, poorly drawn hands, mangled hands, floating hands, disembodied hands, hands near face, hand on chin, fingers touching face, bad lips, deformed mouth, crooked teeth, asymmetrical eyes, uneven eyes, cross-eyed, lazy eye, wall-eyed, different sized eyes, strabismus, dusky skin, dark skin, tan skin, olive complexion, brown skin, tanned, dark complexion, dark tone, unpainted nails, chipped nails, no makeup, completely blurred background, fully out of focus background, gaussian blur, flat chest, small bust, petite chest, boyish figure, shiny jewelry, reflective jewelry, oversized jewelry, chunky jewelry, statement jewelry"

gpu:
  use_lowvram: true
  tile_vae: true
  vram_limit_gb: 6

rescue_mode:
  width: 768
  height: 1152
  steps: 24
  workflow: bootstrap_seeds

paths:
  output_dir: output
  log_dir: logs
  workflows_dir: workflows
