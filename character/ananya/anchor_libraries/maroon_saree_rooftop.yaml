# Anchor library for maroon Banarasi saree on Mumbai rooftop golden hour.
# Generates one anchor per pose group at carousel start. Slides route to matching anchor.
# All anchors share same outfit + scene + lighting; only the pose framing differs.
# Same anchor_seed across all groups → similar background bokeh per group.
#
# Usage:
#   python scripts/faceswap_carousel.py \
#     --prompts character/ananya/carousel_prompts/maroon_saree_rooftop_multi.txt \
#     --face-ref character/ananya/seeds_v2/face_ref_v2.png \
#     --name maroon_saree_multi_01 \
#     --anchor-config character/ananya/anchor_libraries/maroon_saree_rooftop.yaml

anchor_seed: 1018996843  # shared seed across all anchors for BG consistency

# Shared outfit + scene tail appended to each anchor prompt
shared_tail: >
  wearing deep maroon silk Banarasi saree with intricate gold zari border draped pleated
  over left shoulder and fitted black short-sleeve blouse, gold jhumka earrings,
  dark hair loose beachy waves, Mumbai high-rise rooftop at golden hour with hazy city
  skyline behind, warm orange backlight, photorealistic 50mm,
  shot on Kodak Portra 400 film, visible skin pores and faint peach fuzz, subtle skin
  imperfections, slight natural oil shine on T-zone, 35mm film grain, photographic
  grain noise, candid unretouched amateur photography style, raw unedited look,
  no retouching

anchors:
  standing:
    prompt: >
      size M hourglass figure woman with fuller bust, slim defined small waist,
      balanced curvy hips, slim toned thighs, soft feminine curves, slim with curves
      not plus size, South Asian 23 year old, photorealistic full body editorial photo of a
      23-year-old standing in neutral three-quarter pose facing camera weight shifted
      on right leg,

  sitting:
    prompt: >
      size M hourglass figure woman with fuller bust, slim defined small waist,
      balanced curvy hips, slim toned thighs, soft feminine curves, slim with curves
      not plus size, South Asian 23 year old, photorealistic full body editorial photo of a
      23-year-old seated comfortably on rooftop ledge cross-legged side angle,

  closeup:
    prompt: >
      size M hourglass figure woman with fuller bust and slim defined small waist,
      soft feminine curves, slim with curves not plus size, South Asian 23 year old,
      photorealistic Instagram editorial waist-up portrait facing
      camera with slight smile,
